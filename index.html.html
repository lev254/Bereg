<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>БЕРЕГ — пространство мыслей</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Темы */
        :root {
            --bg: #0a0f16;
            --card: #111827dd;
            --card-solid: #111827;
            --border: #2d3a4e;
            --text: #eef2ff;
            --text-dim: #8ba0b5;
            --accent: #4ade80;
            --accent-dark: #22c55e;
            --react-bg: #1e293b;
            --input: #0f172a;
        }

        body.light {
            --bg: #eef2f5;
            --card: #ffffffdd;
            --card-solid: #ffffff;
            --border: #d1dce6;
            --text: #1a2a32;
            --text-dim: #5a6f82;
            --accent: #2c7a5e;
            --accent-dark: #1e5a45;
            --react-bg: #f1f5f9;
            --input: #ffffff;
        }

        body.mint {
            --bg: #c8e6df;
            --card: #ffffffcc;
            --card-solid: #ffffff;
            --border: #9bc4b0;
            --text: #1a3a2a;
            --text-dim: #4a7c64;
            --accent: #3b8b6e;
            --accent-dark: #2c6b52;
            --react-bg: #e6f5ed;
            --input: #ffffff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, 'Inter', -apple-system, sans-serif;
            padding: 20px 16px 40px;
            transition: all 0.2s;
        }

        .app {
            max-width: 750px;
            margin: 0 auto;
        }

        /* стеклянные карточки */
        .glass {
            background: var(--card);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 1.3rem;
            margin-bottom: 1rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #7bc5a4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .theme-select {
            background: var(--card-solid);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 6px 12px;
            color: var(--text);
            font-family: inherit;
        }

        /* приветственное окно */
        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .welcome-card {
            background: var(--card-solid);
            border-radius: 2rem;
            padding: 2rem;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--accent);
        }

        /* комнаты */
        .rooms-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 16px 0;
        }
        .room {
            background: var(--card-solid);
            border-radius: 1.2rem;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid var(--border);
        }
        .room-left { display: flex; align-items: center; gap: 12px; }
        .room-emoji { font-size: 1.6rem; }

        /* чат */
        .chat-panel { display: none; }
        .chat-panel.active { display: block; }
        .messages {
            background: var(--input);
            border-radius: 1.2rem;
            padding: 12px;
            height: 400px;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .msg {
            background: var(--card-solid);
            border-radius: 1rem;
            padding: 10px;
            margin-bottom: 12px;
            border-left: 3px solid var(--accent);
        }
        .msg-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--accent);
            margin-bottom: 6px;
        }
        .react-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .react-btn {
            background: var(--react-bg);
            border: none;
            border-radius: 40px;
            padding: 2px 8px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .views {
            font-size: 0.6rem;
            color: var(--text-dim);
            margin-top: 6px;
        }

        .input-area {
            display: flex;
            gap: 8px;
        }
        .input-area input {
            flex: 1;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 10px 16px;
            color: var(--text);
        }

        button { background: var(--accent-dark); border: none; border-radius: 40px; padding: 8px 16px; cursor: pointer; color: white; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-dark);
            color: white;
            padding: 8px 18px;
            border-radius: 60px;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 1100;
        }
        hr { border-color: var(--border); margin: 16px 0; }
        .rules {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-align: center;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header glass">
        <div class="logo">🌊 БЕРЕГ</div>
        <select id="themeSelect" class="theme-select">
            <option value="dark">🌙 тёмный</option>
            <option value="light">☀️ светлый</option>
            <option value="mint">🍃 мятный</option>
        </select>
    </div>

    <!-- Главный экран -->
    <div id="mainPanel">
        <div class="glass">
            <div style="display: flex; justify-content: space-between;">
                <span>✨ твоё имя: <strong id="userName">волна</strong></span>
                <button id="newNameBtn">🌀 новое</button>
            </div>
        </div>
        <div class="glass">
            <div class="rooms-grid" id="roomsList"></div>
        </div>
        <div class="glass rules">
            <h4>📜 ПРАВИЛА БЕРЕГА</h4>
            <p>✅ можно: делиться мыслями, ставить реакции, менять имя, выбирать тему.<br>
            ❌ нельзя: оскорблять, спамить, выдавать себя за другого.<br>
            🌊 для кого: для тех, кто устал от шума и хочет выдохнуть.<br>
            💭 как поможет: ты поймёшь, что ты не один.</p>
        </div>
    </div>

    <!-- Чат -->
    <div id="chatPanel" class="chat-panel">
        <div class="glass">
            <button id="backBtn">← назад</button>
            <h3 id="roomTitle" style="margin: 10px 0;"></h3>
            <div class="messages" id="msgContainer"></div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="напиши..." autocomplete="off">
                <button id="sendBtn">📤</button>
            </div>
        </div>
    </div>
    <div class="toast" id="toast">👍</div>
</div>

<script>
    // ------------------- КОМНАТЫ -------------------
    const rooms = [
        { id: "pain", emoji: "🩹", name: "что болит" },
        { id: "joy", emoji: "🌸", name: "что радует" },
        { id: "thoughts", emoji: "🌙", name: "просто мысли" },
        { id: "night", emoji: "🌃", name: "никто не спит в 3 часа" }
    ];

    let currentRoom = null;
    let currentUser = localStorage.getItem("shore_user") || ("волна_" + Math.floor(Math.random()*100));
    document.getElementById("userName").innerText = currentUser;

    // Имена для генерации
    const names = ["волна", "луна", "ветер", "тишина", "свет", "море", "песок", "звезда", "туман", "рассвет"];
    document.getElementById("newNameBtn").onclick = () => {
        currentUser = names[Math.floor(Math.random()*names.length)] + "_" + Math.floor(Math.random()*90+10);
        localStorage.setItem("shore_user", currentUser);
        document.getElementById("userName").innerText = currentUser;
        showToast("🌀 теперь ты " + currentUser);
        if(currentRoom) renderMessages();
    };

    // ---------- РАБОТА С ДАННЫМИ ----------
    function getData(roomId) {
        let raw = localStorage.getItem(`shore_${roomId}`);
        return raw ? JSON.parse(raw) : { messages: [], views: 0 };
    }
    function saveData(roomId, data) {
        localStorage.setItem(`shore_${roomId}`, JSON.stringify(data));
    }

    function addMessage(roomId, text) {
        let data = getData(roomId);
        data.messages.push({
            id: Date.now(),
            user: currentUser,
            text: text.slice(0, 500),
            time: Date.now(),
            reacts: { like:0, heart:0, sad:0, fire:0 }
        });
        saveData(roomId, data);
        renderMessages();
    }

    function addReaction(roomId, msgId, type) {
        let data = getData(roomId);
        let msg = data.messages.find(m => m.id == msgId);
        if(msg) {
            msg.reacts[type] = (msg.reacts[type] || 0) + 1;
            saveData(roomId, data);
            renderMessages();
        }
    }

    function incrementViews(roomId) {
        let data = getData(roomId);
        data.views = (data.views || 0) + 1;
        saveData(roomId, data);
        renderMessages();
    }

    function renderMessages() {
        if(!currentRoom) return;
        let data = getData(currentRoom);
        let container = document.getElementById("msgContainer");
        container.innerHTML = data.messages.map(msg => `
            <div class="msg">
                <div class="msg-header"><span>🌊 ${escapeHtml(msg.user)}</span><span>${new Date(msg.time).toLocaleTimeString()}</span></div>
                <div>${escapeHtml(msg.text)}</div>
                <div class="react-buttons">
                    <button class="react-btn" data-id="${msg.id}" data-type="like">👍 ${msg.reacts.like || 0}</button>
                    <button class="react-btn" data-id="${msg.id}" data-type="heart">❤️ ${msg.reacts.heart || 0}</button>
                    <button class="react-btn" data-id="${msg.id}" data-type="sad">😢 ${msg.reacts.sad || 0}</button>
                    <button class="react-btn" data-id="${msg.id}" data-type="fire">🔥 ${msg.reacts.fire || 0}</button>
                </div>
                <div class="views">👁️ просмотров: ${data.views || 0}</div>
            </div>
        `).join("");
        // вешаем события на реакции
        document.querySelectorAll(".react-btn").forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                let id = btn.getAttribute("data-id");
                let type = btn.getAttribute("data-type");
                addReaction(currentRoom, id, type);
            };
        });
        container.scrollTop = container.scrollHeight;
        // увеличить счётчик просмотров один раз за сессию
        let viewed = sessionStorage.getItem(`viewed_${currentRoom}`);
        if(!viewed) {
            incrementViews(currentRoom);
            sessionStorage.setItem(`viewed_${currentRoom}`, 'yes');
        }
    }

    function sendMessage() {
        let input = document.getElementById("msgInput");
        let text = input.value.trim();
        if(text) {
            addMessage(currentRoom, text);
            input.value = "";
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    function showToast(t) {
        let toast = document.getElementById("toast");
        toast.innerText = t;
        toast.style.opacity = "1";
        setTimeout(() => toast.style.opacity = "0", 1500);
    }

    // UI рендер комнат
    function renderRooms() {
        let container = document.getElementById("roomsList");
        container.innerHTML = rooms.map(room => `
            <div class="room" data-id="${room.id}">
                <div class="room-left"><div class="room-emoji">${room.emoji}</div><div>${room.name}</div></div>
                <div>→</div>
            </div>
        `).join("");
        document.querySelectorAll(".room").forEach(el => {
            el.onclick = () => openChat(el.getAttribute("data-id"));
        });
    }

    function openChat(roomId) {
        currentRoom = roomId;
        let room = rooms.find(r => r.id === roomId);
        document.getElementById("roomTitle").innerText = room.emoji + " " + room.name;
        document.getElementById("mainPanel").style.display = "none";
        document.getElementById("chatPanel").classList.add("active");
        renderMessages();
    }

    function closeChat() {
        document.getElementById("mainPanel").style.display = "block";
        document.getElementById("chatPanel").classList.remove("active");
        currentRoom = null;
    }

    // ТЕМЫ
    function setTheme(theme) {
        document.body.classList.remove("light", "mint");
        if(theme === "light") document.body.classList.add("light");
        if(theme === "mint") document.body.classList.add("mint");
        localStorage.setItem("shore_theme", theme);
    }
    let savedTheme = localStorage.getItem("shore_theme") || "dark";
    setTheme(savedTheme);
    document.getElementById("themeSelect").value = savedTheme;
    document.getElementById("themeSelect").onchange = (e) => setTheme(e.target.value);

    // ПРИВЕТСТВИЕ
    if(!localStorage.getItem("welcomed")) {
        let div = document.createElement("div");
        div.className = "welcome-overlay";
        div.innerHTML = `<div class="welcome-card"><h2>🌊 добро пожаловать на БЕРЕГ</h2><p>выбери слой, напиши что чувствуешь — анонимно, без страха.<br>ставь реакции, меняй имя, дыши.</p><button id="closeWelcome">⟳ начать</button></div>`;
        document.body.appendChild(div);
        div.querySelector("#closeWelcome").onclick = () => {
            div.remove();
            localStorage.setItem("welcomed", "true");
        };
    }

    // КНОПКИ
    document.getElementById("backBtn").onclick = closeChat;
    document.getElementById("sendBtn").onclick = sendMessage;
    document.getElementById("msgInput").addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });

    renderRooms();
    // автоочистка старых сообщений (24ч)
    setInterval(() => {
        let limit = Date.now() - 86400000;
        rooms.forEach(room => {
            let data = getData(room.id);
            let filtered = data.messages.filter(m => m.time > limit);
            if(filtered.length !== data.messages.length) {
                data.messages = filtered;
                saveData(room.id, data);
                if(currentRoom === room.id) renderMessages();
            }
        });
    }, 3600000);
</script>
</body>
</html>
